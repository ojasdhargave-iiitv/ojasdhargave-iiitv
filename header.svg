<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Rajdhani:wght@700&amp;display=swap');

      .bg { fill: #0d1117; }
      .grid-line { stroke: #161b22; stroke-width: 1; }
      .name { font-family: 'Rajdhani', 'Arial Black', sans-serif; font-size: 52px; font-weight: 700; fill: #ffffff; }
      .glow-name { font-family: 'Rajdhani', 'Arial Black', sans-serif; font-size: 52px; font-weight: 700; fill: none; stroke: #58A6FF; stroke-width: 1.5; }
      .mono { font-family: 'Share Tech Mono', monospace; font-size: 12px; fill: #58A6FF; }
      .mono-dim { font-family: 'Share Tech Mono', monospace; font-size: 11px; fill: #1f6feb; }
      .dot { fill: #58A6FF; }
      .dot-dim { fill: #1f6feb; }
      .line-accent { stroke: #58A6FF; stroke-width: 1.5; }
      .line-dim { stroke: #1f6feb; stroke-width: 1; }

      /* Particle dots */
      .p1 { animation: float1 4s ease-in-out infinite; }
      .p2 { animation: float2 5s ease-in-out infinite; }
      .p3 { animation: float3 3.5s ease-in-out infinite; }
      .p4 { animation: float4 6s ease-in-out infinite; }
      .p5 { animation: float5 4.5s ease-in-out infinite; }

      /* Scanning line */
      .scan { animation: scanMove 3s linear infinite; }

      /* Corner brackets */
      .bracket { animation: bracketPulse 2s ease-in-out infinite; }

      /* Data streams */
      .stream1 { animation: streamFall1 2.5s linear infinite; }
      .stream2 { animation: streamFall2 3.2s linear infinite 0.8s; }
      .stream3 { animation: streamFall3 2.8s linear infinite 1.5s; }
      .stream4 { animation: streamFall4 3.5s linear infinite 0.3s; }

      /* Name reveal */
      .name-main { animation: nameGlow 3s ease-in-out infinite; }
      .name-outline { animation: outlineShift 3s ease-in-out infinite; }

      /* Subtitle blink */
      .cursor { animation: blink 1s step-end infinite; }

      /* Corner lines */
      .corner-tl { animation: cornerExpand 2s ease-out forwards; }
      .corner-br { animation: cornerExpand 2s ease-out 0.3s forwards; }

      /* Hex grid */
      .hex { animation: hexPulse 4s ease-in-out infinite; }
      .hex2 { animation: hexPulse 4s ease-in-out 1.3s infinite; }
      .hex3 { animation: hexPulse 4s ease-in-out 2.6s infinite; }

      @keyframes float1 {
        0%, 100% { transform: translate(0, 0); opacity: 0.8; }
        50% { transform: translate(3px, -6px); opacity: 1; }
      }
      @keyframes float2 {
        0%, 100% { transform: translate(0, 0); opacity: 0.5; }
        50% { transform: translate(-4px, -4px); opacity: 0.9; }
      }
      @keyframes float3 {
        0%, 100% { transform: translate(0, 0); opacity: 0.7; }
        50% { transform: translate(5px, -3px); opacity: 1; }
      }
      @keyframes float4 {
        0%, 100% { transform: translate(0, 0); opacity: 0.4; }
        50% { transform: translate(-3px, -8px); opacity: 0.8; }
      }
      @keyframes float5 {
        0%, 100% { transform: translate(0, 0); opacity: 0.6; }
        50% { transform: translate(6px, -5px); opacity: 1; }
      }
      @keyframes scanMove {
        0% { transform: translateY(-10px); opacity: 0; }
        10% { opacity: 0.5; }
        90% { opacity: 0.5; }
        100% { transform: translateY(210px); opacity: 0; }
      }
      @keyframes bracketPulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes streamFall1 {
        0% { transform: translateY(-30px); opacity: 0; }
        15% { opacity: 1; }
        85% { opacity: 1; }
        100% { transform: translateY(200px); opacity: 0; }
      }
      @keyframes streamFall2 {
        0% { transform: translateY(-30px); opacity: 0; }
        15% { opacity: 0.7; }
        85% { opacity: 0.7; }
        100% { transform: translateY(200px); opacity: 0; }
      }
      @keyframes streamFall3 {
        0% { transform: translateY(-30px); opacity: 0; }
        15% { opacity: 0.5; }
        85% { opacity: 0.5; }
        100% { transform: translateY(200px); opacity: 0; }
      }
      @keyframes streamFall4 {
        0% { transform: translateY(-30px); opacity: 0; }
        15% { opacity: 0.8; }
        85% { opacity: 0.8; }
        100% { transform: translateY(200px); opacity: 0; }
      }
      @keyframes nameGlow {
        0%, 100% { fill: #ffffff; filter: drop-shadow(0 0 0px #58A6FF); }
        50% { fill: #e6f4ff; filter: drop-shadow(0 0 12px #58A6FF); }
      }
      @keyframes outlineShift {
        0%, 100% { stroke: #58A6FF; opacity: 0.3; stroke-dashoffset: 0; }
        50% { stroke: #79c0ff; opacity: 0.7; stroke-dashoffset: 20; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes cornerExpand {
        0% { stroke-dashoffset: 60; opacity: 0; }
        100% { stroke-dashoffset: 0; opacity: 1; }
      }
      @keyframes hexPulse {
        0%, 100% { opacity: 0.08; }
        50% { opacity: 0.22; }
      }
    </style>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="0.5"/>
    </pattern>

    <!-- Scan gradient -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58A6FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </linearGradient>

    <!-- Corner dash arrays -->
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="50%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#58A6FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" class="bg"/>

  <!-- Grid overlay -->
  <rect width="900" height="200" fill="url(#grid)"/>

  <!-- Hexagon background shapes -->
  <polygon class="hex" points="820,20 840,10 860,20 860,40 840,50 820,40" fill="none" stroke="#58A6FF" stroke-width="1"/>
  <polygon class="hex2" points="60,150 80,140 100,150 100,170 80,180 60,170" fill="none" stroke="#58A6FF" stroke-width="1"/>
  <polygon class="hex3" points="860,140 880,130 900,140 900,160 880,170 860,160" fill="none" stroke="#1f6feb" stroke-width="1"/>

  <!-- Falling data streams (left side) -->
  <g class="stream1">
    <text x="28" y="0" class="mono-dim" font-size="10">1</text>
    <text x="28" y="14" class="mono-dim" font-size="10">0</text>
    <text x="28" y="28" class="mono-dim" font-size="10">1</text>
    <text x="28" y="42" class="mono-dim" font-size="10">1</text>
    <text x="28" y="56" class="mono-dim" font-size="10">0</text>
  </g>
  <g class="stream2">
    <text x="44" y="0" class="mono-dim" font-size="10">0</text>
    <text x="44" y="14" class="mono-dim" font-size="10">1</text>
    <text x="44" y="28" class="mono-dim" font-size="10">0</text>
    <text x="44" y="42" class="mono-dim" font-size="10">0</text>
  </g>

  <!-- Falling data streams (right side) -->
  <g class="stream3">
    <text x="858" y="0" class="mono-dim" font-size="10">1</text>
    <text x="858" y="14" class="mono-dim" font-size="10">1</text>
    <text x="858" y="28" class="mono-dim" font-size="10">0</text>
    <text x="858" y="42" class="mono-dim" font-size="10">1</text>
  </g>
  <g class="stream4">
    <text x="874" y="0" class="mono-dim" font-size="10">0</text>
    <text x="874" y="14" class="mono-dim" font-size="10">0</text>
    <text x="874" y="28" class="mono-dim" font-size="10">1</text>
    <text x="874" y="42" class="mono-dim" font-size="10">0</text>
    <text x="874" y="56" class="mono-dim" font-size="10">1</text>
  </g>

  <!-- Top left corner bracket -->
  <g class="bracket" filter="url(#glow)">
    <path d="M 70,18 L 70,8 L 80,8" fill="none" stroke="#58A6FF" stroke-width="2" stroke-linecap="round" stroke-dasharray="60" class="corner-tl"/>
    <path d="M 820,182 L 820,192 L 810,192" fill="none" stroke="#58A6FF" stroke-width="2" stroke-linecap="round" stroke-dasharray="60" class="corner-br"/>
  </g>

  <!-- Small decorative dots — floating particles -->
  <g class="p1" filter="url(#glow)">
    <circle cx="110" cy="30" r="2" class="dot"/>
  </g>
  <g class="p2" filter="url(#glow)">
    <circle cx="790" cy="170" r="2" class="dot"/>
  </g>
  <g class="p3" filter="url(#glow)">
    <circle cx="150" cy="170" r="1.5" class="dot-dim"/>
  </g>
  <g class="p4" filter="url(#glow)">
    <circle cx="750" cy="25" r="2" class="dot-dim"/>
  </g>
  <g class="p5" filter="url(#glow)">
    <circle cx="450" cy="20" r="1.5" class="dot"/>
  </g>

  <!-- Scanning line -->
  <g class="scan">
    <rect x="65" y="0" width="770" height="18" fill="url(#scanGrad)" opacity="0.5"/>
  </g>

  <!-- Horizontal accent lines -->
  <line x1="80" y1="40" x2="200" y2="40" class="line-dim"/>
  <line x1="700" y1="40" x2="820" y2="40" class="line-dim"/>
  <line x1="80" y1="160" x2="200" y2="160" class="line-dim"/>
  <line x1="700" y1="160" x2="820" y2="160" class="line-dim"/>

  <!-- Top label -->
  <text x="82" y="36" class="mono" font-size="9" opacity="0.6">// profile.init()</text>
  <text x="680" y="36" class="mono" font-size="9" opacity="0.6" text-anchor="end">v2.0.28 ▸</text>

  <!-- MAIN NAME with glow -->
  <text x="450" y="115" text-anchor="middle" class="name name-main" filter="url(#strongGlow)">Ojas Dhargave</text>
  <!-- Outline layer for extra glow pop -->
  <text x="450" y="115" text-anchor="middle" class="glow-name name-outline" stroke-dasharray="10 5">Ojas Dhargave</text>

  <!-- Divider line under name -->
  <line x1="200" y1="128" x2="700" y2="128" stroke="url(#nameGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Subtitle row -->
  <text x="450" y="150" text-anchor="middle" class="mono" font-size="13" fill="#8b949e">
    Full-Stack Dev · UI/UX · IIIT Vadodara '28
  </text>

  <!-- Bottom status bar -->
  <rect x="80" y="168" width="740" height="18" fill="#161b22" rx="3" opacity="0.6"/>
  <circle cx="96" cy="177" r="4" fill="#3fb950"/>
  <text x="107" y="181" class="mono" font-size="9" fill="#3fb950">ACTIVE</text>
  <text x="155" y="181" class="mono" font-size="9" fill="#8b949e">│ CSE @ IIITV │ Open to Internships</text>
  <text x="790" y="181" class="mono" font-size="9" fill="#8b949e" text-anchor="end">2028 ◈</text>
</svg>
